<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practice</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header>
    <div class="header-top">
      <nav class="header-nav">
        <a href="#/" class="nav-link" id="nav-text">Text</a>
        <a href="#/words" class="nav-link" id="nav-words">Words</a>
      </nav>
    </div>
    <div class="header-controls">
      <div class="control-row">
        <label for="api-key-input">API Key</label>
        <input type="password" id="api-key-input" placeholder="Enter your Google Cloud API key">
      </div>
      <div class="control-row">
        <label for="voice-select">Voice</label>
        <select id="voice-select"></select>
      </div>
      <div class="control-row">
        <label for="speed-range">Speed <span id="speed-value">1.0</span></label>
        <input type="range" id="speed-range" min="0.5" max="2.0" step="0.1" value="1.0">
      </div>
      <div class="control-row">
        <label for="language-select">Language</label>
        <select id="language-select"></select>
      </div>
    </div>
  </header>

  <div id="banner" class="banner hidden"></div>

  <main id="app">
    <!-- Input view -->
    <div id="input-view" class="hidden">
      <textarea id="text-input" placeholder="Paste text here…" rows="10"></textarea>
      <button id="start-btn">Start Practice</button>
      <div id="history-list"></div>
    </div>

    <!-- Text view -->
    <div id="text-view" class="hidden">
      <div class="sentences-panel" id="sentences-panel">
        <div class="inline-player hidden" id="inline-player"></div>
      </div>
      <div id="full-player" class="full-player hidden"></div>
      <div class="text-controls">
        <a id="back-btn" href="#/">← Back</a>
        <button id="toggle-text-btn" title="Toggle text visibility">Hide text</button>
        <button id="hold-mic-btn" title="Keep microphone active between recordings">Hold mic</button>
      </div>
      <div class="shortcuts-help">
        <div class="shortcut"><kbd>Space</kbd> Play / Stop</div>
        <div class="shortcut"><kbd>→</kbd> <kbd>↓</kbd> <kbd>Enter</kbd> Next sentence</div>
        <div class="shortcut"><kbd>←</kbd> <kbd>↑</kbd> <kbd>Backspace</kbd> Previous sentence</div>
        <div class="shortcut"><kbd>Esc</kbd> Close player / Deselect</div>
        <div class="shortcut"><kbd>T</kbd> <kbd>H</kbd> Toggle text visibility</div>
        <div class="shortcut"><kbd>P</kbd> Play / pause all</div>
      </div>
    </div>

    <!-- Words view -->
    <div id="words-view" class="hidden">
      <div class="words-header">
        <h2>Word Practice</h2>
        <div class="words-sort-controls">
          <button id="sort-recent-btn" class="active">Recent</button>
          <button id="sort-due-btn">Due</button>
        </div>
      </div>
      <div id="word-cards-container"></div>
    </div>
  </main>

  <script type="module" src="js/main.js"></script>
</body>

</html>
